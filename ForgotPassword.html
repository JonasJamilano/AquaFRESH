<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AquaFRESH | Forgot Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="ForgotPassword.css">
</head>
<body>

    <div class="forgot-container">
        <div class="forgot-card">

            <div class="forgot-brand">
                <img src="assets/AquaFRESH.png" alt="AquaFRESH Logo" class="forgot-logo">
                <p>Reset your account password</p>
            </div>

            <form class="forgot-form" id="forgotPasswordForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input
                        type="email"
                        id="resetEmail"
                        placeholder="Enter your registered email"
                        required
                    >
                </div>

                <button type="submit" class="reset-btn">
                    Send Reset Link
                </button>

                <p class="back-link">
                    Remember your password?
                    <a href="Login.html">Back to Login</a>
                </p>
            </form>

            <p id="message" class="status-message"></p>
            <p class="forgot-footer">© 2026 AquaFRESH</p>
        </div>
    </div>

    <script type="module">
        import { auth } from "./firebase.js";
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const forgotForm = document.getElementById("forgotPasswordForm");
        const message = document.getElementById("message");

        forgotForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("resetEmail").value;

            try {
                await sendPasswordResetEmail(auth, email);
                message.textContent = "✅ Reset link sent! Check your inbox.";
                message.style.color = "#2e7d32";
                forgotForm.reset();
            } catch (error) {
                message.textContent = "❌ Error: " + error.message;
                message.style.color = "#b71c1c";
            }
        });
    </script>

</body>
</html>
