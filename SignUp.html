<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AquaFRESH | Sign Up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="SignUp.css">
    <link rel="icon" type="image/png" href="assets/AquaFRESH.png">

</head>
<body>

<div class="signup-container">
    <div class="signup-card">

        <div class="signup-brand">
            <img src="assets/AquaFRESH.png" alt="AquaFRESH Logo" class="signup-logo">
            <p>Aquaculture Freshness Monitoring System</p>
        </div>

        <form class="signup-form" id="signupForm">

            <!-- FULL NAME -->
            <div class="form-group">
                <label>Full Name</label>
                <input 
                    type="text" 
                    id="fullName" 
                    placeholder="e.g. Juan Dela Cruz" 
                    required
                >
            </div>

            <!-- EMAIL -->
            <div class="form-group">
                <label>Email</label>
                <input 
                    type="email" 
                    id="signupEmail" 
                    placeholder="e.g. juan@email.com" 
                    required
                >
            </div>

            <!-- PHONE -->
            <div class="form-group">
                <label>Phone Number</label>
                <input
                    type="tel"
                    id="phone"
                    placeholder="09XXXXXXXXX"
                    pattern="[0-9]{11}"
                    title="Enter 11-digit mobile number"
                    required
                >
            </div>

            <!-- ADDRESS -->
            <div class="form-group">
                <label>Address</label>
                <input 
                    type="text" 
                    id="address" 
                    placeholder="Complete home address" 
                    required
                >
            </div>

            <!-- ROLE SELECTION -->
            <div class="form-group">
                <label>Register As</label>
                <select id="role" required>
                    <option value="" disabled selected>Select your role</option>

                    <!-- Public Roles -->
                    <option value="inspector">Inspector</option>
                    <option value="delivery">Delivery Staff</option>

                    <!-- TEMPORARY FOR TESTING -->
                    <option value="manager">Manager (Testing)</option>
                    <option value="admin">Admin (Testing)</option>
                    <option value="superadmin">Super Admin (Testing)</option>
                </select>
            </div>

            <!-- PASSWORD -->
            <div class="form-group">
                <label>Password</label>
                <input 
                    type="password" 
                    id="signupPassword" 
                    placeholder="Minimum 6 characters" 
                    required
                >
            </div>

            <!-- CONFIRM PASSWORD -->
            <div class="form-group">
                <label>Confirm Password</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    placeholder="Re-enter password" 
                    required
                >
            </div>

            <button type="submit" class="signup-btn">
                Create Account
            </button>

            <p class="login-link">
                Already have an account?
                <a href="Login.html">Login</a>
            </p>
        </form>

        <p class="signup-footer">© 2026 AquaFRESH</p>
    </div>
</div>

<script type="module" src="auth.js"></script>
</body>
</html>
