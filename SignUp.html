<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AquaFRESH | Sign Up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="SignUp.css">
    <link rel="icon" type="image/png" href="assets/AquaFRESH.png">
</head>
<body>

<div class="signup-container">
    <div class="signup-card">

        <div class="signup-brand">
            <img src="assets/AquaFRESH.png" alt="AquaFRESH Logo" class="signup-logo">
            <p>Aquaculture Freshness Monitoring System</p>
        </div>

        <form class="signup-form" id="signupForm">

            <!-- FULL NAME -->
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="e.g. Juan Dela Cruz" required>
            </div>

            <!-- EMAIL -->
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signupEmail" placeholder="e.g. juan@email.com" required>
            </div>

            <!-- PHONE -->
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="09XXXXXXXXX" pattern="[0-9]{11}" title="Enter 11-digit mobile number" required>
            </div>

            <!-- ADDRESS -->
            <div class="form-group">
                <label>Address</label>
                <input type="text" id="address" placeholder="Complete home address" required>
            </div>

            <!-- ROLE SELECTION -->
            <div class="form-group">
                <label>Register As</label>
                <select id="role" required>
                    <option value="" disabled selected>Select your role</option>
                    <option value="inspector">Inspector</option>
                    <option value="delivery">Delivery Staff</option>
                    <option value="customer">Customer</option>
                </select>
            </div>

            <!-- CUSTOMER FIELDS — shown only when Customer is selected -->
            <div id="customerFields" style="display:none;">
                <div class="form-group">
                    <label>Delivery Address</label>
                    <input type="text" id="deliveryAddress" placeholder="Where should orders be delivered?">
                </div>
            </div>

            <!-- PASSWORD -->
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Minimum 6 characters" required>
            </div>

            <!-- CONFIRM PASSWORD -->
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
            </div>

            <button type="submit" class="signup-btn">Create Account</button>

            <p class="login-link">
                Already have an account? <a href="Login.html">Login</a>
            </p>
        </form>

        <p class="signup-footer">© 2026 AquaFRESH</p>
    </div>
</div>

<script>
    // Show/hide customer-specific fields based on role selection
    document.getElementById("role").addEventListener("change", function() {
        const customerFields = document.getElementById("customerFields");
        customerFields.style.display = this.value === "customer" ? "block" : "none";
        document.getElementById("deliveryAddress").required = this.value === "customer";
    });
</script>

<script type="module" src="auth.js"></script>
</body>
</html>
