<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AquaFRESH | Sign Up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="SignUp.css">
</head>
<body>

    <div class="signup-container">
        <div class="signup-card">

            <div class="signup-brand">
                <img src="assets/AquaFRESH.png" alt="AquaFRESH Logo" class="signup-logo">
                <p>Aquaculture Freshness Monitoring System</p>
            </div>

            <form class="signup-form" id="signupForm">

                <div class="form-group">
                    <label>Full Name</label>
                    <input
                        type="text"
                        id="fullName"
                        placeholder="Enter full name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input
                        type="email"
                        id="signupEmail"
                        placeholder="Enter email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input
                        type="tel"
                        id="phone"
                        placeholder="09XX-XXX-XXXX"
                        pattern="[0-9]{11}"
                        title="Please enter an 11-digit Philippine mobile number"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <input
                        type="text"
                        id="address"
                        placeholder="Enter complete address"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input
                        type="password"
                        id="signupPassword"
                        placeholder="Create password"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm password"
                        required
                    >
                </div>

                <button type="submit" class="signup-btn">
                    Create Account
                </button>

                <p class="login-link">
                    Already have an account?
                    <a href="Login.html">Login</a>
                </p>
            </form>

            <p class="signup-footer">© 2026 AquaFRESH</p>
        </div>
    </div>

    <script type="module" src="auth.js"></script>

</body>
</html>
