<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AquaFRESH | Edit Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="Dashboard.css">
    <link rel="stylesheet" href="EditProfile.css">
</head>
<body>

<input type="checkbox" id="nav-toggle">

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="brand">
        <h1>AquaFRESH</h1>
        <p>Aquaculture Freshness Monitoring System</p>
    </div>

    <nav class="menu">
        <ul>
            <li data-role="superadmin admin manager">
                <a href="Dashboard.html">
                    <span class="icon"></span>
                    <span class="label">Dashboard</span>
                </a>
            </li>

            <li data-role="superadmin admin manager inspector delivery">
                <a href="FreshnessEvaluation.html">
                    <span class="icon"></span>
                    <span class="label">Freshness Evaluation</span>
                </a>
            </li>

            <li data-role="superadmin admin manager">
                <a href="UserManagement.html">
                    <span class="icon"></span>
                    <span class="label">User Management</span>
                </a>
            </li>
        </ul>
    </nav>
</aside>

<!-- TOP BAR -->
<header class="topbar">
    <label for="nav-toggle" class="menu-btn">☰</label>

    <div class="profile-dropdown">
        <input type="checkbox" id="profile-toggle">
        <label for="profile-toggle" class="profile-trigger">
            <span id="userRoleLabel">User</span>
            <span class="caret">▾</span>
        </label>

        <div class="dropdown-menu">
            <a href="Profile.html">Profile</a>
            <a href="Login.html" class="logout">Logout</a>
        </div>
    </div>
</header>

<!-- MAIN CONTENT -->
<main class="content">
    <h2>Edit Profile</h2>
    <p>Update your personal information below.</p>

    <form class="profile-container" id="editProfileForm">

        <!-- HEADER -->
        <div class="profile-header">
            <div class="avatar" id="editAvatar">--</div>
            <div class="profile-info">
                <h2 id="editHeaderName">Loading...</h2>
                <p class="email" id="editHeaderEmail">Loading...</p>
                <span class="role-badge" id="editHeaderRole">Loading...</span>
            </div>
        </div>

        <!-- EDITABLE FIELDS -->
        <div class="profile-details">

            <div class="form-group accent">
                <label>Full Name</label>
                <input type="text" id="editFullName" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="editEmail" required>
            </div>

            <div class="form-group">
                <label>Address</label>
                <input type="text" id="editAddress">
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="editPhone">
            </div>

            <div class="form-group readonly">
                <label>Role</label>
                <input type="text" id="editRole" disabled>
            </div>

        </div>

        <!-- ACTIONS -->
        <div class="form-actions">
            <a href="Profile.html" class="btn cancel">Cancel</a>
            <button type="submit" class="btn save">Save Changes</button>
        </div>

    </form>
</main>

<!-- EDIT PROFILE SCRIPT — Firebase only, no localhost -->
<script type="module">
    import { auth, db } from "./firebase.js";
    import {
        onAuthStateChanged,
        updateEmail
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import {
        doc,
        getDoc,
        updateDoc
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let currentUser = null;

    function getInitials(fullName) {
        if (!fullName) return "U";
        const parts = fullName.trim().split(" ");
        if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
        return (
            parts[0].charAt(0).toUpperCase() +
            parts[parts.length - 1].charAt(0).toUpperCase()
        );
    }

    function formatRole(role) {
        if (!role) return "";
        return role.charAt(0).toUpperCase() + role.slice(1);
    }

    // ── Load profile from Firestore on auth ready ──
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "Login.html";
            return;
        }

        currentUser = user;

        try {
            const userDoc = await getDoc(doc(db, "users", user.uid));

            if (!userDoc.exists()) {
                alert("User profile not found.");
                window.location.href = "Login.html";
                return;
            }

            const data = userDoc.data();

            const fullName = data.fullName || localStorage.getItem("userFullName") || "";
            const role     = data.role     || localStorage.getItem("userRole")     || "user";
            const email    = data.email    || user.email || "";

            // Populate header
            document.getElementById("editAvatar").textContent      = getInitials(fullName);
            document.getElementById("editHeaderName").textContent  = fullName || "Unknown User";
            document.getElementById("editHeaderEmail").textContent = email;
            document.getElementById("editHeaderRole").textContent  = formatRole(role);

            // Populate form fields
            document.getElementById("editFullName").value = fullName;
            document.getElementById("editEmail").value    = email;
            document.getElementById("editAddress").value  = data.address || "";
            document.getElementById("editPhone").value    = data.phone   || "";
            document.getElementById("editRole").value     = formatRole(role);

            // Topbar
            document.getElementById("userRoleLabel").textContent = fullName;

        } catch (err) {
            console.error("Error loading edit profile:", err);
            alert("Failed to load profile. Please try again.");
        }
    });

    // ── Save changes to Firestore (and Auth email if changed) ──
    document.getElementById("editProfileForm")
        .addEventListener("submit", async (e) => {
            e.preventDefault();

            if (!currentUser) {
                alert("You are not logged in.");
                window.location.href = "Login.html";
                return;
            }

            const fullName = document.getElementById("editFullName").value.trim();
            const email    = document.getElementById("editEmail").value.trim();
            const address  = document.getElementById("editAddress").value.trim();
            const phone    = document.getElementById("editPhone").value.trim();

            try {
                // Update Firestore document
                await updateDoc(doc(db, "users", currentUser.uid), {
                    fullName,
                    email,
                    address,
                    phone
                });

                // Update Firebase Auth email only if it changed
                if (email !== currentUser.email) {
                    await updateEmail(currentUser, email);
                }

                // Keep localStorage in sync
                localStorage.setItem("userFullName", fullName);
                localStorage.setItem("userEmail",    email);

                alert("Profile updated successfully!");
                window.location.href = "Profile.html";

            } catch (err) {
                console.error("Error updating profile:", err);

                // Firebase throws a specific error if re-authentication is needed
                if (err.code === "auth/requires-recent-login") {
                    alert("For security, please log out and log back in before changing your email.");
                } else {
                    alert("Failed to update profile: " + err.message);
                }
            }
        });
</script>

<script type="module" src="sidebar.js"></script>
<script type="module" src="role-ui.js"></script>

</body>
</html>
