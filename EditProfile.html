<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AquaFRESH | Edit Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="Dashboard.css">
    <link rel="stylesheet" href="EditProfile.css">
</head>
<body>

<input type="checkbox" id="nav-toggle">

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="brand">
        <h1>AquaFRESH</h1>
        <p>Aquaculture Freshness Monitoring System</p>
    </div>

    <nav class="menu">
        <ul>
            <li data-role="superadmin admin manager">
                <a href="Dashboard.html">
                    <span class="icon"></span>
                    <span class="label">Dashboard</span>
                </a>
            </li>

            <li data-role="superadmin admin manager inspector delivery">
                <a href="FreshnessEvaluation.html">
                    <span class="icon"></span>
                    <span class="label">Freshness Evaluation</span>
                </a>
            </li>

            <li data-role="superadmin admin manager">
                <a href="UserManagement.html">
                    <span class="icon"></span>
                    <span class="label">User Management</span>
                </a>
            </li>
        </ul>
    </nav>
</aside>

<!-- TOP BAR -->
<header class="topbar">
    <label for="nav-toggle" class="menu-btn">☰</label>

    <div class="profile-dropdown">
        <input type="checkbox" id="profile-toggle">
        <label for="profile-toggle" class="profile-trigger">
            <span id="userRoleLabel">User</span>
            <span class="caret">▾</span>
        </label>

        <div class="dropdown-menu">
            <a href="Profile.html">Profile</a>
            <a href="Login.html" class="logout">Logout</a>
        </div>
    </div>
</header>

<!-- MAIN CONTENT -->
<main class="content">
    <h2>Edit Profile</h2>
    <p>Update your personal information below.</p>

    <form class="profile-container" id="editProfileForm">

        <!-- HEADER -->
        <div class="profile-header">
            <div class="avatar" id="editAvatar">JS</div>
            <div class="profile-info">
                <h2 id="editHeaderName">Loading...</h2>
                <p class="email" id="editHeaderEmail">Loading...</p>
                <span class="role-badge" id="editHeaderRole">Loading...</span>
            </div>
        </div>

        <!-- EDITABLE FIELDS -->
        <div class="profile-details">

            <div class="form-group accent">
                <label>Full Name</label>
                <input type="text" id="editFullName" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="editEmail" required>
            </div>

            <div class="form-group">
                <label>Address</label>
                <input type="text" id="editAddress">
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="editPhone">
            </div>

            <div class="form-group readonly">
                <label>Role</label>
                <input type="text" id="editRole" disabled>
            </div>

        </div>

        <!-- ACTIONS -->
        <div class="form-actions">
            <a href="Profile.html" class="btn cancel">Cancel</a>
            <button type="submit" class="btn save">Save Changes</button>
        </div>

    </form>
</main>

<!-- EDIT PROFILE SCRIPT -->
<script>
  const API_BASE_URL = "http://localhost:3000";

  function getInitials(fullName) {
    if (!fullName) return "U";
    const parts = fullName.trim().split(" ");
    if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
    return (
      parts[0].charAt(0).toUpperCase() +
      parts[parts.length - 1].charAt(0).toUpperCase()
    );
  }

  function formatRole(role) {
    if (!role) return "";
    return role.charAt(0).toUpperCase() + role.slice(1);
  }

  async function loadEditProfile() {
    const userId = localStorage.getItem("userId");
    const storedFullName = localStorage.getItem("userFullName");
    const storedRole = localStorage.getItem("userRole");

    console.log("EditProfile - userId:", userId);

    if (!userId) {
      window.location.href = "Login.html";
      return;
    }

    try {
      const res = await fetch(`${API_BASE_URL}/users/${userId}`);
      console.log("EditProfile fetch status:", res.status);

      if (!res.ok) {
        throw new Error("Failed to load profile");
      }

      const user = await res.json();
      console.log("EditProfile data from server:", user);

      const fullName = user.fullName || storedFullName || "";
      const role = user.role || storedRole || "user";

      // Header
      document.getElementById("editAvatar").textContent = getInitials(fullName);
      document.getElementById("editHeaderName").textContent = fullName || "Unknown User";
      document.getElementById("editHeaderEmail").textContent = user.email || "No email";
      document.getElementById("editHeaderRole").textContent = formatRole(role);

      // Form fields
      document.getElementById("editFullName").value = fullName;
      document.getElementById("editEmail").value = user.email || "";
      document.getElementById("editAddress").value = user.address || "";
      document.getElementById("editPhone").value = user.phone || "";
      document.getElementById("editRole").value = formatRole(role);

      // Topbar label
      const userRoleLabelEl = document.getElementById("userRoleLabel");
      if (userRoleLabelEl) {
        userRoleLabelEl.textContent = formatRole(role);
      }
    } catch (err) {
      console.error("Error loading edit profile:", err);
      alert("Failed to load profile. Please log in again.");
      window.location.href = "Login.html";
    }
  }

  async function handleEditProfileSubmit(event) {
    event.preventDefault();

    const userId = localStorage.getItem("userId");
    if (!userId) {
      alert("User not logged in");
      window.location.href = "Login.html";
      return;
    }

    const fullName = document.getElementById("editFullName").value.trim();
    const email = document.getElementById("editEmail").value.trim();
    const address = document.getElementById("editAddress").value.trim();
    const phone = document.getElementById("editPhone").value.trim();

    const body = {
      fullName,
      email,
      address,
      phone
    };

    console.log("Submitting edit profile for user", userId, "with body:", body);

    try {
      const res = await fetch(`${API_BASE_URL}/users/${userId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      const data = await res.json();
      console.log("EditProfile update response:", res.status, data);

      if (!res.ok) {
        alert(data.error || "Failed to update profile");
        return;
      }

      // Update stored name/email so Profile.html and topbar etc. are in sync
      localStorage.setItem("userFullName", fullName);
      localStorage.setItem("userEmail", email);

      alert("Profile updated successfully!");
      window.location.href = "Profile.html";
    } catch (err) {
      console.error("Error updating profile:", err);
      alert("Failed to update profile. Please try again.");
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    loadEditProfile();

    const form = document.getElementById("editProfileForm");
    if (form) {
      form.addEventListener("submit", handleEditProfileSubmit);
    }
  });
</script>

<script type="module" src="sidebar.js"></script>
<script type="module" src="role-ui.js"></script>

</body>
</html>
